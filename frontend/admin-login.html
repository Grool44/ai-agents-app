<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админ вход - AI Office</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e1a;color:#fff;height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.auth-card{background:#0f172a;border:1px solid #1e3a5f;border-radius:20px;padding:40px;width:90%;max-width:380px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
.logo{font-size:56px;margin-bottom:16px}
h1{font-size:24px;margin-bottom:6px}
p{color:#94a3b8;font-size:14px;margin-bottom:24px}
.form-group{margin-bottom:16px}
input{width:100%;background:rgba(0,0,0,0.3);border:1px solid #1e3a5f;border-radius:10px;padding:12px 16px;color:#fff;font-size:14px;outline:none;transition:border-color .2s}
input:focus{border-color:#ef4444}
.btn{width:100%;padding:12px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;color:#fff;transition:all .2s;margin-top:4px}
.btn-danger{background:#ef4444}
.btn-danger:hover{background:#dc2626;transform:translateY(-1px)}
.links{margin-top:20px;font-size:13px}
.links a{color:#60a5fa;text-decoration:none}
.links a:hover{text-decoration:underline}
.glow{position:fixed;width:300px;height:300px;background:#ef4444;border-radius:50%;filter:blur(120px);opacity:.12;pointer-events:none;bottom:20%;left:30%}
</style>
</head>
<body>
<div class="glow"></div>
<div class="auth-card">
<div class="logo">🔐</div>
<h1>Админ панель</h1>
<p>Вход для администраторов</p>
<form id="adminForm">
<div class="form-group"><input type="password" id="adminPass" required placeholder="Пароль администратора"></div>
<button type="submit" class="btn btn-danger">Войти</button>
</form>
<div class="links"><a href="/login.html">← Обычный вход</a></div>
</div>
<script>
document.getElementById("adminForm").addEventListener("submit",function(e){
  e.preventDefault();
  if(document.getElementById("adminPass").value==="d2620751"){window.location.href="/admin.html";}
  else{alert("Неверный пароль");}
});
</script>
</body>
</html>
