<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel AI Office</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    body {
      font-family: 'Press Start 2P', cursive;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    
    #pixelCanvas {
      position: fixed;
      top: 50px;
      left: 0;
      width: 100%;
      height: calc(100% - 50px);
      display: block;
      z-index: 1;
      background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      image-rendering: pixelated;
    }
    
    .pixel-agent {
      cursor: pointer;
      transition: transform 0.1s;
    }
    
    .pixel-agent:hover {
      transform: scale(1.1);
    }
    
    .pixel-desk {
      image-rendering: pixelated;
    }
    
    .pixel-name-tag {
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>👾 Pixel AI Office</h1>
    <div class="header-right">
      <span id="aiStatusBadge" class="ai-badge off">ИИ: выкл</span>
      <div class="user-info">👤 <span id="userDisplayName">User</span></div>
      <button id="btnToggleStyle" class="btn btn-secondary" style="width:auto;padding:6px 12px" onclick="togglePixelStyle()">🎨 Режим: Pixel</button>
      <select id="officeSelect" class="btn btn-secondary" style="width:auto;padding:6px 12px">
        <option value="office1">Офис 1</option>
        <option value="office2">Офис 2</option>
        <option value="office3">Офис 3</option>
      </select>
      <button id="btnCreateAgent" class="btn btn-success">+ Нанять</button>
      <a href="/profile.html" class="btn btn-secondary">Профиль</a>
      <button id="btnLogout" class="btn btn-danger">Выйти</button>
    </div>
  </div>

  <canvas id="pixelCanvas"></canvas>

  <div class="tasks-panel">
    <h3>📋 Задачи офиса</h3>
    <div class="tasks-grid" id="tasksGrid"></div>
  </div>

  <div id="chatOverlay" class="chat-overlay">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-avatar" id="chatAvatar">🤖</div>
        <div>
          <div class="chat-title" id="chatTitle">Сотрудник</div>
          <div class="chat-subtitle" id="chatSubtitle">Должность</div>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" id="btnCloseChat">✕ Закрыть</button>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-bar">
      <button id="btnVoice" class="voice-btn" title="Голосовой ввод">🎤</button>
      <input type="text" id="messageInput" placeholder="Напишите сообщение...">
      <button id="btnSend" class="btn btn-success">Отправить</button>
    </div>
  </div>

  <div id="createModal" class="modal">
    <div class="modal-content">
      <div class="modal-header"><h2>Нанять сотрудника</h2><button class="modal-close" id="btnCloseModal">&times;</button></div>
      <div class="modal-body">
        <form id="createAgentForm">
          <div class="form-group"><label>Имя</label><input type="text" id="agentName" required placeholder="Иван Петров"></div>
          <div class="form-group"><label>Должность</label><select id="agentType" required>
            <option value="custom">✨ Кастомная</option>
            <option value="ceo">👔 Ген. директор</option>
            <option value="coder">💻 Программист</option>
            <option value="researcher">🔍 Исследователь</option>
            <option value="analyst">📊 Аналитик</option>
            <option value="poster">📝 Контент-мейкер</option>
          </select></div>
          <div class="form-group custom-role-box" id="customRoleBox"><label>Обязанности</label><textarea id="agentRole" rows="3" placeholder="Опишите что делает сотрудник..."></textarea></div>
          <div class="form-group"><label>Описание</label><input type="text" id="agentDescription" placeholder="Краткое описание"></div>
          <div style="display:flex;gap:10px"><button type="submit" class="btn btn-success" style="flex:1">Нанять</button><button type="button" class="btn btn-secondary" id="btnCancelModal" style="flex:1">Отмена</button></div>
        </form>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<style>
/* Polyfill для roundRect в старых браузерах */
@supports not (border-radius: 8px round(4px)) {
  * { border-radius: 0 !important; }
}
</style>

<script>
const API_BASE = "http://localhost:8000/api/v1";
let currentUser = null, agents = [], tasks = [], selectedAgent = null, aiEnabled = false, recognition = null;
let isPixelStyle = true;

function togglePixelStyle() {
  isPixelStyle = !isPixelStyle;
  const btn = document.getElementById("btnToggleStyle");
  if (isPixelStyle) {
    document.body.classList.remove("modern-style");
    btn.textContent = "🎨 Режим: Pixel";
    btn.className = "btn btn-secondary";
  } else {
    document.body.classList.add("modern-style");
    btn.textContent = "🎨 Режим: Modern";
    btn.className = "btn btn-primary";
  }
  // Перерисовать канвас с новым стилем
  if (pixelCtx) {
    renderPixelOffice();
  }
}

const COLORS = { ceo:"#f59e0b", coder:"#10b981", researcher:"#8b5cf6", analyst:"#ec4899", poster:"#f97316", custom:"#64748b" };
const AVATARS = { ceo:"👔", coder:"💻", researcher:"🔍", analyst:"📊", poster:"📝", custom:"✨" };
const ROLES = { ceo:"Ген. директор", coder:"Программист", researcher:"Исследователь", analyst:"Аналитик", poster:"Контент-мейкер", custom:"Специалист" };

let pixelCtx, pixelAgents = [];
let currentOffice = "office1";
let animationFrame = 0;

// Вычисляет ширину таблички с именем на основе длины текста
function calculateNameWidth(name) {
  const chars = name.length;
  const baseWidth = 60; // Минимальная ширина
  const charWidth = 9;  // Ширина одного символа
  return baseWidth + (chars * charWidth);
}

// Вычисляет динамическое расположение агентов на основе длины их имён
function calculateDynamicLayout(agentList) {
  const canvas = document.getElementById("pixelCanvas");
  const width = canvas.width / (window.devicePixelRatio || 1);
  const height = canvas.height / (window.devicePixelRatio || 1);
  
  const positions = [];
  const rowY = [100, 220, 340, 460]; // Y координаты рядов
  let currentRow = 0;
  let currentX = 60;
  let rowMaxWidth = 0;
  
  agentList.forEach((agent, index) => {
    const nameWidth = calculateNameWidth(agent.name);
    const totalWidth = nameWidth + 100; // Имя + отступы
    
    // Если текущий агент не помещается в ряд, переходим на следующий
    if (currentX + totalWidth > width - 60) {
      currentRow++;
      currentX = 60;
      rowMaxWidth = 0;
    }
    
    // Центрируем агента в рядy
    const centerX = currentX + totalWidth / 2;
    positions.push({ x: centerX, y: rowY[currentRow % rowY.length] });
    
    currentX += totalWidth;
    rowMaxWidth = Math.max(rowMaxWidth, totalWidth);
  });
  
  return positions;
}

const OFFICE_LAYOUTS = {
  office1: [
    {x:40, y:100}, {x:160, y:100}, {x:280, y:100}, {x:400, y:100},
    {x:100, y:200}, {x:220, y:200}, {x:340, y:200}, {x:460, y:200},
    {x:40, y:300}, {x:160, y:300}, {x:280, y:300}, {x:400, y:300},
    {x:100, y:400}, {x:220, y:400}, {x:340, y:400}, {x:460, y:400},
  ],
  office2: [
    {x:60, y:90}, {x:190, y:90}, {x:320, y:90}, {x:450, y:90}, {x:580, y:90},
    {x:125, y:190}, {x:255, y:190}, {x:385, y:190}, {x:515, y:190},
    {x:60, y:290}, {x:190, y:290}, {x:320, y:290}, {x:450, y:290}, {x:580, y:290},
    {x:125, y:390}, {x:255, y:390}, {x:385, y:390}, {x:515, y:390},
  ],
  office3: [
    {x:80, y:120}, {x:220, y:120}, {x:360, y:120}, {x:500, y:120},
    {x:150, y:220}, {x:290, y:220}, {x:430, y:220}, {x:570, y:220},
    {x:80, y:320}, {x:220, y:320}, {x:360, y:320}, {x:500, y:320},
    {x:150, y:420}, {x:290, y:420}, {x:430, y:420}, {x:570, y:420},
  ],
};

function showToast(msg, isError) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.className = "toast" + (isError ? " error" : "");
  t.classList.add("show"); setTimeout(() => t.classList.remove("show"), 3000);
}
function getUser() { try { const u = localStorage.getItem("currentUser"); return u ? JSON.parse(u) : null; } catch(e) { return null; } }

function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById("btnVoice").style.display = "none"; return; }
  recognition = new SR(); recognition.lang = "ru-RU"; recognition.continuous = false; recognition.interimResults = false;
  recognition.onstart = () => { document.getElementById("btnVoice").classList.add("recording"); showToast("🎤 Говорите..."); };
  recognition.onend = () => document.getElementById("btnVoice").classList.remove("recording");
  recognition.onresult = (e) => { const text = e.results[0][0].transcript; document.getElementById("messageInput").value = text; sendMessage(text); };
  recognition.onerror = (e) => showToast("Ошибка микрофона: " + e.error, true);
}

function initPixelCanvas() {
  const canvas = document.getElementById("pixelCanvas");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  pixelCtx = canvas.getContext("2d");
  pixelCtx.scale(dpr, dpr);
  canvas.width = rect.width;
  canvas.height = rect.height;
  
  window.addEventListener("resize", onPixelResize);
  canvas.addEventListener("click", onPixelClick);
  
  // Добавляем hover эффект
  canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    
    pixelAgents.forEach(pa => {
      const dx = x - pa.x;
      const dy = y - pa.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      pa.hovered = dist < 30;
    });
  });
  
  animatePixel();
}

function drawPixelAgent(x, y, color, agent, isHovered) {
  const ctx = pixelCtx;
  const scale = isHovered ? 1.1 : 1;
  const size = 36 * scale;
  const centerX = x;
  const centerY = y;
  
  // Проверяем стиль
  const isModern = document.body.classList.contains("modern-style");
  
  if (isModern) {
    // Современный стиль - красивые круглые аватары
    const avatarSize = size * 1.2;
    
    // Тень
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath();
    ctx.ellipse(centerX, centerY + avatarSize/2 + 6, avatarSize/2.2, avatarSize/5, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Градиентный фон аватара
    const gradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, avatarSize/2);
    gradient.addColorStop(0, color);
    gradient.addColorStop(1, adjustColor(color, -40));
    ctx.fillStyle = gradient;
    
    // Круглый фон
    ctx.beginPath();
    ctx.arc(centerX, centerY, avatarSize/2, 0, Math.PI * 2);
    ctx.fill();
    
    // Блик на аватаре
    ctx.fillStyle = "rgba(255,255,255,0.15)";
    ctx.beginPath();
    ctx.arc(centerX - avatarSize/6, centerY - avatarSize/6, avatarSize/5, 0, Math.PI * 2);
    ctx.fill();
    
    // Иконка/эмодзи по центру
    ctx.font = `${20 * scale}px Arial, sans-serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const emoji = AVATARS[agent.agent_type] || "✨";
    ctx.fillText(emoji, centerX, centerY + 2);
    
  } else {
    // Пиксельный стиль
    // Тень
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath();
    ctx.ellipse(centerX, centerY + size/2 + 2, size/2, size/4, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // Тело (пиксельный стиль)
    ctx.fillStyle = color;
    const bodyWidth = size * 0.6;
    const bodyHeight = size * 0.5;
    const bounce = Math.sin(animationFrame * 0.05 + agent.id) * 2;
    ctx.fillRect(centerX - bodyWidth/2, centerY - bodyHeight/2 + bounce, bodyWidth, bodyHeight);
    
    // Голова
    ctx.fillStyle = "#f5d0a9";
    const headSize = size * 0.35;
    ctx.fillRect(centerX - headSize/2, centerY - bodyHeight/2 - headSize + bounce, headSize, headSize);
    
    // Глаза
    ctx.fillStyle = "#000";
    const eyeSize = 3 * scale;
    ctx.fillRect(centerX - headSize/4, centerY - bodyHeight/2 - headSize/2 + bounce, eyeSize, eyeSize);
    ctx.fillRect(centerX + headSize/4 - eyeSize, centerY - bodyHeight/2 - headSize/2 + bounce, eyeSize, eyeSize);
    
    // Улыбка
    ctx.strokeStyle = "#000";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(centerX, centerY - bodyHeight/2 - headSize/3 + bounce, headSize/4, 0.2, Math.PI - 0.2);
    ctx.stroke();
  }
  
  // Имя - полное в пиксельном режиме
  ctx.fillStyle = "rgba(0,0,0,0.85)";
  const nameWidth = isModern ? 100 : calculateNameWidth(agent.name);
  const nameHeight = isModern ? 26 : 20;
  const nameY = centerY + (isModern ? size/1.8 : size/2 + 10);
  const nameRadius = isModern ? 8 : 0;
  
  // Рисуем имя с закруглениями для modern
  if (isModern) {
    ctx.beginPath();
    ctx.roundRect(centerX - nameWidth/2, nameY, nameWidth, nameHeight, nameRadius);
    ctx.fill();
  } else {
    ctx.fillRect(centerX - nameWidth/2, nameY, nameWidth, nameHeight);
  }
  
  ctx.fillStyle = "#fff";
  ctx.font = (isModern ? "bold 10px" : "9px") + " 'Press Start 2P', cursive";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  
  if (isModern) {
    // Обрезаем только для modern
    const displayName = agent.name.length > 14 ? agent.name.substring(0, 12) + "..." : agent.name;
    ctx.fillText(displayName, centerX, nameY + nameHeight/2 - 1);
  } else {
    // Полное имя для pixel
    ctx.fillText(agent.name, centerX, nameY + nameHeight/2 - 1);
  }
}

// Вспомогательная функция для затемнения цвета
function adjustColor(hex, amount) {
  let num = parseInt(hex.replace("#", ""), 16);
  let r = Math.max(0, Math.min(255, (num >> 16) + amount));
  let g = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amount));
  let b = Math.max(0, Math.min(255, (num & 0x0000FF) + amount));
  return "#" + (0x1000000 + r * 0x10000 + g * 0x100 + b).toString(16).slice(1);
}

function drawPixelDesk(x, y) {
  const ctx = pixelCtx;
  const isModern = document.body.classList.contains("modern-style");
  const deskWidth = isModern ? 60 : 50;
  const deskHeight = isModern ? 36 : 30;
  
  if (isModern) {
    // Современный стиль - аккуратные столы с тенью
    // Тень
    ctx.fillStyle = "rgba(0,0,0,0.2)";
    ctx.beginPath();
    ctx.roundRect(x - deskWidth/2 + 4, y + deskHeight/2 + 4, deskWidth, 8, 4);
    ctx.fill();
    
    // Столешница
    ctx.fillStyle = "#8b5a2b";
    ctx.beginPath();
    ctx.roundRect(x - deskWidth/2, y - deskHeight/2, deskWidth, deskHeight, 4);
    ctx.fill();
    
    // Края
    ctx.strokeStyle = "#6b4423";
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // Монитор
    ctx.fillStyle = "#1f2937";
    ctx.fillRect(x - 18, y - deskHeight/2 - 20, 36, 24);
    ctx.fillStyle = "#10b981";
    ctx.fillRect(x - 15, y - deskHeight/2 - 17, 30, 18);
    
  } else {
    // Пиксельный стиль
    // Стол
    ctx.fillStyle = "#6b4423";
    ctx.fillRect(x - deskWidth/2, y - deskHeight/2, deskWidth, deskHeight);
    
    // Ножки
    ctx.fillStyle = "#4a3728";
    ctx.fillRect(x - deskWidth/2 + 5, y + deskHeight/2, 6, 10);
    ctx.fillRect(x + deskWidth/2 - 11, y + deskHeight/2, 6, 10);
    
    // Монитор
    ctx.fillStyle = "#111";
    ctx.fillRect(x - 15, y - deskHeight/2 - 18, 30, 20);
    ctx.fillStyle = "#10b981";
    ctx.fillRect(x - 12, y - deskHeight/2 - 15, 24, 14);
  }
}
  
function animatePixel() {
  const canvas = document.getElementById("pixelCanvas");
  const ctx = pixelCtx;
  const width = canvas.width / (window.devicePixelRatio || 1);
  const height = canvas.height / (window.devicePixelRatio || 1);
  
  // Очистка
  ctx.clearRect(0, 0, width, height);
  
  // Рисуем сетку пола (пиксельный стиль)
  ctx.strokeStyle = "rgba(255,255,255,0.05)";
  ctx.lineWidth = 1;
  const gridSize = 40;
  for (let x = 0; x < width; x += gridSize) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, height);
    ctx.stroke();
  }
  for (let y = 0; y < height; y += gridSize) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(width, y);
    ctx.stroke();
  }
  
  // Рисуем агентов (сначала столы)
  pixelAgents.forEach((pa, i) => {
    drawPixelDesk(pa.x, pa.y);
  });
  
  // Затем агентов
  pixelAgents.forEach((pa, i) => {
    const color = COLORS[pa.agent.agent_type] || "#64748b";
    const isHovered = pa.hovered || false;
    
    drawPixelAgent(pa.x, pa.y, color, pa.agent, isHovered);
  });
  
  animationFrame++;
  requestAnimationFrame(animatePixel);
}

function onPixelResize() {
  const canvas = document.getElementById("pixelCanvas");
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  pixelCtx.scale(dpr, dpr);
}

function onPixelClick(event) {
  const canvas = document.getElementById("pixelCanvas");
  const rect = canvas.getBoundingClientRect();
  const x = event.clientX - rect.left;
  const y = event.clientY - rect.top;
  
  for (let i = 0; i < pixelAgents.length; i++) {
    const pa = pixelAgents[i];
    const dx = x - pa.x;
    const dy = y - pa.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    
    if (dist < 30) {
      openChat(pa.agent);
      return;
    }
  }
}

async function init() {
  currentUser = getUser();
  if (!currentUser || !currentUser.id) { window.location.href = "/login.html"; return; }
  document.getElementById("userDisplayName").textContent = currentUser.name || "User";
  initVoice(); initPixelCanvas(); await checkAI(); await loadAgents(); await loadTasks();
  renderPixelOffice(); renderTasks();

  document.getElementById("officeSelect").addEventListener("change", function() {
    currentOffice = this.value;
    // В динамическом режиме офис не влияет на расположение
    renderPixelOffice();
    showToast("Офис изменён");
  });
}

async function checkAI() {
  try { const r = await fetch(API_BASE + "/ai/status"); const d = await r.json(); aiEnabled = d.enabled;
    const b = document.getElementById("aiStatusBadge"); if (aiEnabled) { b.textContent = "ИИ: вкл"; b.className = "ai-badge on"; }
  } catch(e) {}
}
async function loadAgents() { try { const r = await fetch(API_BASE + "/agents/" + currentUser.id); agents = await r.json(); } catch(e) { agents = []; } }
async function loadTasks() { try { const r = await fetch(API_BASE + "/tasks/" + currentUser.id); tasks = await r.json(); } catch(e) { tasks = []; } }

function renderPixelOffice() {
  pixelAgents = [];
  if (!agents.length) return;
  
  // Вычисляем динамическое расположение на основе длины имён
  const positions = calculateDynamicLayout(agents);
  
  agents.forEach((a, i) => {
    pixelAgents.push({ 
      agent: a, 
      hovered: false,
      x: positions[i] ? positions[i].x : 100,
      y: positions[i] ? positions[i].y : 100
    });
  });
}

function openChat(agent) {
  selectedAgent = agent;
  document.getElementById("chatTitle").textContent = agent.name;
  document.getElementById("chatSubtitle").textContent = ROLES[agent.agent_type] || agent.agent_type;
  document.getElementById("chatAvatar").textContent = AVATARS[agent.agent_type] || "🤖";
  document.getElementById("chatOverlay").classList.add("active");
  loadMessages(agent.id);
}
function closeChat() { document.getElementById("chatOverlay").classList.remove("active"); selectedAgent = null; }

async function loadMessages(agentId) {
  try { const r = await fetch(API_BASE + "/messages/" + agentId + "/" + currentUser.id); const msgs = await r.json(); renderMessages(msgs); }
  catch(e) { document.getElementById("chatMessages").innerHTML = "<div style='text-align:center;padding:40px;color:#64748b'>Начните диалог!</div>"; }
}
function renderMessages(msgs) {
  const c = document.getElementById("chatMessages");
  if (!msgs || !msgs.length) { c.innerHTML = "<div style='text-align:center;padding:40px;color:#64748b'>Начните диалог с сотрудником!</div>"; return; }
  let html = "";
  msgs.forEach(m => { 
    const time = new Date(m.timestamp).toLocaleTimeString("ru-RU", {hour:"2-digit",minute:"2-digit"}); 
    let content = "";
    // Показываем картинки только от агентов
    if (m.image && m.sender === "agent") {
      content = "<div>" + (m.text ? m.text.replace(/\n/g,"<br>") : "") + "</div>";
      content += "<img src='" + m.image + "' alt='Сгенерированное изображение' onclick='viewImage(\"" + m.image + "\")'>";
    } else if (m.text) {
      content = "<div>" + m.text.replace(/\n/g,"<br>") + "</div>";
    }
    html += "<div class='message " + m.sender + "'>" + content + "<div class='message-time'>" + time + "</div></div>"; 
  });
  c.innerHTML = html; c.scrollTop = c.scrollHeight;
}

function viewImage(src) {
  const win = window.open();
  win.document.write('<html><head><title>Просмотр изображения</title><style>body{margin:0;display:flex;align-items:center;justify-content:center;min-height:100vh;background:#000}</style></head><body><img src="' + src + '" style="max-width:100%;max-height:100vh"></body></html>');
}

async function sendMessage(text) {
  if (!text || !selectedAgent) return;
  const c = document.getElementById("chatMessages");
  const time = new Date().toLocaleTimeString("ru-RU", {hour:"2-digit",minute:"2-digit"});

  c.innerHTML += "<div class='message user'><div>" + text.replace(/\n/g,"<br>") + "</div><div class='message-time'>" + time + "</div></div>";
  c.scrollTop = c.scrollHeight; document.getElementById("messageInput").value = "";
  try {
    const r = await fetch(API_BASE + "/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({agent_id:selectedAgent.id,user_id:currentUser.id,text:text,sender:"user"})
    });
    const d = await r.json();
    if (d.response) await loadMessages(selectedAgent.id);
  } catch(e) { showToast("Ошибка отправки", true); }
}

function renderTasks() {
  const grid = document.getElementById("tasksGrid");
  grid.innerHTML = "";
  if (!tasks || !tasks.length) { grid.innerHTML = "<div style='color:#64748b;min-width:200px'>Нет задач</div>"; return; }
  tasks.forEach(t => {
    const card = document.createElement("div"); card.className = "task-card " + t.status;
    const agent = agents.find(a => a.id === t.agent_id);
    let html = "<div class='task-title'>" + (t.status==="completed"?"✅ ":"⏳ ") + t.title + "</div><div class='task-desc'>" + t.description + "</div><div class='task-meta'><span>👉 " + (agent?agent.name:"?") + "</span><span>" + (t.status==="completed"?"Готово":"В работе") + "</span></div>";
    if (t.status === "pending") html += "<button class='btn btn-success' style='margin-top:8px;width:100%;font-size:11px;padding:6px' onclick='executeTask(" + t.id + ")'>▶ Выполнить</button>";
    else if (t.result) html += "<div class='task-result' style='margin-top:8px;padding:8px;background:rgba(0,0,0,0.3);border-radius:6px;white-space:pre-wrap;max-height:60px;overflow-y:auto'>" + t.result.substring(0,150).replace(/\n/g,"<br>") + (t.result.length>150?"...":"") + "</div>";
    card.innerHTML = html; grid.appendChild(card);
  });
}
async function executeTask(taskId) {
  showToast("⏳ Выполняю...");
  try { const r = await fetch(API_BASE + "/tasks/" + taskId + "/execute", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({user_id:currentUser.id}) }); const d = await r.json(); if (r.ok) { showToast("✅ Готово!"); await loadTasks(); renderTasks(); } else showToast("Ошибка", true); }
  catch(e) { showToast("Ошибка сети", true); }
}

async function deleteAgent(id, name) {
  if (!confirm("Уволить " + name + "?")) return;
  try { const r = await fetch(API_BASE + "/agents/" + id + "?user_id=" + currentUser.id, { method:"DELETE" }); if (r.ok) { showToast(name + " уволен"); await loadAgents(); await loadTasks(); renderOffice(); renderTasks(); } else showToast("Ошибка", true); }
  catch(e) { showToast("Ошибка сети", true); }
}

function openModal() { document.getElementById("createModal").classList.add("active"); }
function closeModal() { document.getElementById("createModal").classList.remove("active"); document.getElementById("createAgentForm").reset(); document.getElementById("customRoleBox").classList.remove("active"); }
document.getElementById("agentType").addEventListener("change", function() { const box = document.getElementById("customRoleBox"); if (this.value === "custom") box.classList.add("active"); else box.classList.remove("active"); });
document.getElementById("createAgentForm").addEventListener("submit", async function(e) {
  e.preventDefault(); const user = getUser(); if (!user || !user.id) { showToast("Не авторизован", true); return; }
  const name = document.getElementById("agentName").value, type = document.getElementById("agentType").value, role = document.getElementById("agentRole").value, desc = document.getElementById("agentDescription").value;
  try { const r = await fetch(API_BASE + "/agents", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({name,agent_type:type,description:type==="custom"?role:desc,user_id:user.id}) }); const d = await r.json(); if (r.ok) { showToast(name + " нанят!"); closeModal(); await loadAgents(); renderOffice(); } else showToast("Ошибка", true); }
  catch(e) { showToast("Ошибка сети", true); }
});

document.getElementById("btnCreateAgent").addEventListener("click", openModal);
document.getElementById("btnCloseModal").addEventListener("click", closeModal);
document.getElementById("btnCancelModal").addEventListener("click", closeModal);
document.getElementById("btnLogout").addEventListener("click", function() { localStorage.removeItem("currentUser"); window.location.href = "/login.html"; });
document.getElementById("btnCloseChat").addEventListener("click", closeChat);
document.getElementById("btnSend").addEventListener("click", function() { sendMessage(document.getElementById("messageInput").value.trim()); });
document.getElementById("messageInput").addEventListener("keydown", function(e) { if (e.key === "Enter") sendMessage(this.value.trim()); });
document.getElementById("btnVoice").addEventListener("click", function() { if (recognition) recognition.start(); });

document.addEventListener("DOMContentLoaded", init);
</script>
</body>
