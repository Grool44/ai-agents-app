<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль - AI Office</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0e1a;color:#fff;min-height:100vh}
.header{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:rgba(10,14,26,0.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,0.08);height:50px}
.header h1{font-size:17px}
.header-right{display:flex;gap:10px}
.btn{padding:6px 14px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:600;color:#fff;text-decoration:none;display:inline-flex;align-items:center;transition:all .2s}
.btn:hover{transform:translateY(-1px)}
.btn-secondary{background:#334155}
.btn-danger{background:#ef4444}
.container{padding:80px 20px 40px;max-width:600px;margin:0 auto}
.profile-card{background:#0f172a;border:1px solid #1e3a5f;border-radius:20px;padding:40px;text-align:center;margin-bottom:24px}
.avatar{width:80px;height:80px;border-radius:50%;background:#1e3a5f;display:flex;align-items:center;justify-content:center;font-size:40px;margin:0 auto 16px}
.profile-name{font-size:22px;font-weight:700;margin-bottom:4px}
.profile-email{color:#94a3b8;font-size:14px;margin-bottom:24px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat-card{background:rgba(0,0,0,0.2);border:1px solid #1e3a5f;border-radius:12px;padding:16px;text-align:center}
.stat-number{font-size:24px;font-weight:700;color:#3b82f6;margin-bottom:4px}
.stat-label{color:#94a3b8;font-size:12px}
.glow{position:fixed;width:400px;height:400px;background:#3b82f6;border-radius:50%;filter:blur(150px);opacity:.08;pointer-events:none;top:10%;left:50%;transform:translateX(-50%)}
</style>
</head>
<body>
<div class="glow"></div>
<div class="header">
<h1>🏢 AI Office</h1>
<div class="header-right">
<a href="/dashboard.html" class="btn btn-secondary">← В офис</a>
<button onclick="logout()" class="btn btn-danger">Выйти</button>
</div>
</div>
<div class="container">
<div class="profile-card">
<div class="avatar">👤</div>
<div class="profile-name" id="pName">Загрузка...</div>
<div class="profile-email" id="pEmail">...</div>
<div class="stats-grid">
<div class="stat-card"><div class="stat-number" id="pReg">-</div><div class="stat-label">Дата регистрации</div></div>
<div class="stat-card"><div class="stat-number" id="pAgents">-</div><div class="stat-label">Сотрудников</div></div>
<div class="stat-card"><div class="stat-number" id="pTasks">-</div><div class="stat-label">Задач</div></div>
<div class="stat-card"><div class="stat-number" id="pMsgs">-</div><div class="stat-label">Сообщений</div></div>
</div>
</div>
</div>
<script>
const API_BASE="http://localhost:8000/api/v1";
function getUser(){try{const u=localStorage.getItem("currentUser");return u?JSON.parse(u):null;}catch(e){return null;}}
async function init(){
  const user=getUser();if(!user||!user.id){window.location.href="/login.html";return;}
  document.getElementById("pName").textContent=user.name||"Пользователь";
  document.getElementById("pEmail").textContent=user.email||"";
  if(user.reg_date){document.getElementById("pReg").textContent=new Date(user.reg_date).toLocaleDateString("ru-RU");}
  try{const[ar,tr,mr]=await Promise.all([fetch(API_BASE+"/agents/"+user.id),fetch(API_BASE+"/tasks/"+user.id),fetch(API_BASE+"/messages/0/"+user.id).catch(()=>({json:()=>[]}))]);const a=await ar.json(),t=await tr.json();let m=[];try{m=await mr.json();}catch(e){}document.getElementById("pAgents").textContent=a.length;document.getElementById("pTasks").textContent=t.length;document.getElementById("pMsgs").textContent=Array.isArray(m)?m.length:0;}catch(e){console.log(e);}
}
function logout(){localStorage.removeItem("currentUser");window.location.href="/login.html";}
document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
