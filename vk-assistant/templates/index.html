<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VK Базука - Игра</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .stats {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .stat {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin: 5px 0;
        }
        .stat-label { font-size: 14px; color: #666; }
        .click-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s;
            margin: 20px 0;
        }
        .click-btn:hover { transform: scale(1.05); }
        .click-btn:active { transform: scale(0.95); }
        .upgrades { margin-top: 20px; }
        .upgrade-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
        }
        .upgrade-btn:disabled { background: #ccc; }
        .upgrade-btn:hover:not(:disabled) { background: #45a049; }
        .name-input {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin: 10px 0;
        }
        .save-btn {
            background: #2196F3;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .auto-income {
            background: #ff9800;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VK Базука</h1>
        <p style="color: #666;">Кликай, улучшай, зарабатывай!</p>
        
        <input type="text" class="name-input" id="nameInput" placeholder="Твоё имя">
        <button class="save-btn" onclick="saveName()">Сохранить</button>
        
        <div class="stats">
            <div class="stat" id="money">0</div>
            <div class="stat-label">💰 Деньги</div>
            <div class="stat" id="level" style="font-size: 18px; margin-top: 10px;">Ур. 1</div>
            <div class="stat" id="base" style="font-size: 18px;">База ур. 1</div>
            <div class="auto-income" id="income">+0 в сек</div>
        </div>
        
        <button class="click-btn" onclick="clickBtn()">КЛИК!</button>
        
        <div class="upgrades">
            <button class="upgrade-btn" id="upgradeBase" onclick="upgradeBase()">
                Улучшить базу (50 💰)
            </button>
            <button class="upgrade-btn" id="upgradeLevel" onclick="upgradeLevel()">
                Повысить уровень (100 💰)
            </button>
        </div>
    </div>

    <script>
        let data = {};
        
        async function loadData() {
            const res = await fetch('/api/data');
            data = await res.json();
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('money').textContent = data.money;
            document.getElementById('level').textContent = 'Ур. ' + data.level;
            document.getElementById('base').textContent = 'База ур. ' + data.base_level;
            document.getElementById('income').textContent = '+' + data.income + ' в сек';
            document.getElementById('nameInput').value = data.player_name;
            
            document.getElementById('upgradeBase').disabled = data.money < data.base_level * 50;
            document.getElementById('upgradeLevel').disabled = data.money < data.level * 100;
            
            document.getElementById('upgradeBase').textContent = 
                `Улучшить базу (${data.base_level * 50} 💰)`;
            document.getElementById('upgradeLevel').textContent = 
                `Повысить уровень (${data.level * 100} 💰)`;
        }
        
        async function clickBtn() {
            const res = await fetch('/api/click', { method: 'POST' });
            data = await res.json();
            updateUI();
        }
        
        async function upgradeBase() {
            const res = await fetch('/api/upgrade/base', { method: 'POST' });
            data = await res.json();
            updateUI();
        }
        
        async function upgradeLevel() {
            const res = await fetch('/api/upgrade/level', { method: 'POST' });
            data = await res.json();
            updateUI();
        }
        
        async function saveName() {
            const name = document.getElementById('nameInput').value;
            await fetch('/api/set_name', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            alert('Имя сохранено!');
        }
        
        setInterval(loadData, 1000);
        loadData();
    </script>
</body>
</html>
