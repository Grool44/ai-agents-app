[variables]
NIXPACKS_PYTHON_VERSION = "3.11"

[phases.setup]
nixPkgs = ["python311Full"]

[phases.install]
cmds = ["python -m ensurepip --upgrade", "python -m pip install --no-cache-dir -r requirements.txt"]

[phases.build]
cmds = []

[start]
cmd = "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"